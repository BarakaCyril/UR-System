syntax = "proto3";

message RemoteMessage {
  oneof message_data {
    RemotePingRequest remote_ping_request = 8;
    RemotePingResponse remote_ping_response = 9;
    RemoteKeyInject remote_key_inject = 11;
    RemoteActive message_active = 20;
  }
}

message RemotePingRequest {
  int32 val1 = 1;
}

message RemotePingResponse {
  int32 val1 = 1;
}

message RemoteKeyInject {
  int32 key_code = 1;
  int32 direction = 2; // 0 = SHORT_PRESS, 1 = START_LONG, 2 = END_LONG
}

message RemoteActive {
    int32 active = 1;
}