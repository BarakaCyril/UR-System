syntax = "proto3";

message PairingRequest {
  string client_name = 1;
  string service_name = 2;
}

message PairingRequestAck {
  string server_name = 1;
}

message PairingOption {
  int32 preferred_role = 1;
  int32 input_encoding = 2;
}

message PairingConfiguration {
  PairingOption client_role = 1;
}

message PairingConfigurationAck {
  PairingOption server_role = 1;
}

message Secret {
  bytes secret = 1;
}